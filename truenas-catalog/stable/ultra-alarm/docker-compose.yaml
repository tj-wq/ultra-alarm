services:
  ultra-alarm:
    image: tjwq/ultra-alarm:latest
    container_name: ultra-alarm-server
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:8765"
    volumes:
      - ${APP_DATA_PATH}:/data
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL}
      - WHISPER_DEVICE=${WHISPER_DEVICE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - PORT=8765
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
