services:
  ultra-alarm:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ultra-alarm-server
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8765}:8765"
    volumes:
      - ${CONFIG_PATH:-./config.json}:/app/config.json:ro
      - ${ENV_PATH:-./.env}:/app/.env:ro
      # Persist whisper model cache to avoid re-downloading on rebuild
      - ${CACHE_PATH:-whisper-cache}:/root/.cache
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - PORT=8765
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  whisper-cache:
