services:
  ultra-alarm:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ultra-alarm-server
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8765}:8765"
    volumes:
      # Single persistent volume — config.json auto-generated on first run
      - ${DATA_PATH:-./data}:/data
      # Whisper model cache persists across rebuilds
      - ${CACHE_PATH:-whisper-cache}:/root/.cache
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - PORT=8765
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  whisper-cache:
